name: MagicPort Owner Enricher

on:
  # schedule:
  #   # Daily at 03:00 UTC — 1h after vessel-at-port enricher
  #   - cron: '0 3 * * *'
  workflow_dispatch:

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  enrich-owners:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests curl_cffi beautifulsoup4

      - name: Run MagicPort owner enricher
        run: python magicport_owner_enricher.py

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owner-enricher-log
          path: |
            *.log
