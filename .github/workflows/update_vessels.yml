name: Update vessels data

on:
  push:
    paths:
      - "data/tracked_imos.json"
  schedule:
    - cron: "30 5-22 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install requests supabase

- name: Run scraper
  env:
    CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
    CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
    RENDER_BASE: ${{ secrets.RENDER_BASE }}
    API_SECRET: ${{ secrets.API_SECRET }}
    SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}   # ← ADD THIS
  run: python scrape_vesselfinder.py

      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/vessels_data.json data/static_vessel_cache.json data/failure_counts.json || true
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "Update vessels data #${{ github.run_number }}"
            git pull --rebase -X theirs origin main
            git push origin main
          else
            echo "No changes to commit"
          fi
