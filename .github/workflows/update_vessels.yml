name: Update vessels data

on:
  schedule:
    - cron: "0,30 5-22 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger (optional)"
        required: false
        default: "Manual run"

jobs:
  scrape:
    name: Scrape vessel data
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
    pip install --upgrade pip
    pip install supabase requests beautifulsoup4

      - name: Run scraper
        id: scraper
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          RENDER_BASE: ${{ secrets.RENDER_BASE }}
          API_SECRET: ${{ secrets.API_SECRET }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: python scrape_vesselfinder.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Scraper failed at $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "View logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
