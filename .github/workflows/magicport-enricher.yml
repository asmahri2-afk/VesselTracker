name: MagicPort Vessel Enricher

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests curl_cffi

      - name: Run MagicPort enricher
        run: python magicport_enricher.py

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enricher-log
          path: |
            *.log
