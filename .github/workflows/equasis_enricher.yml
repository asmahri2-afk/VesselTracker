name: Equasis Enricher (Daily Cache)

on:
  schedule:
    - cron: '0 4 * * *'       # Every day at 04:00 UTC (before monitor runs at 05:00)
  workflow_dispatch:           # Manual trigger

concurrency:
  group: equasis-enricher
  cancel-in-progress: false    # Never cancel mid-run — partial writes are fine but messy

jobs:
  enrich:
    name: Enrich vessel cache from Equasis
    runs-on: ubuntu-latest
    timeout-minutes: 120       # 2h ceiling — no cap on vessels, batches take time

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🚀 Run Equasis enricher
        env:
          RENDER_BASE:          ${{ secrets.RENDER_BASE }}
          API_SECRET:           ${{ secrets.API_SECRET }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python equasis_enricher.py

      - name: 🔔 Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🚨 Equasis Enricher Failed — Run ${context.runId}`,
              body:  `**Run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n**Time:** ${new Date().toISOString()}\n\nCheck logs for details.`,
              labels: ['enricher-failure', 'automated'],
            });
